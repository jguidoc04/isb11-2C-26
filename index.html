<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Compuertas Lógicas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0e17;
    --panel: #0f1623;
    --border: #1e2d45;
    --border-glow: #1a4a7a;
    --text: #a8c8e8;
    --text-dim: #4a6a8a;
    --accent: #00d4ff;
    --accent2: #0088bb;
    --on-color: #00ff88;
    --off-color: #1a3a2a;
    --key-off: #111827;
    --key-border: #1e3a5f;
    --gate-bg: #0d1926;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; width: 100%; max-width: 900px; }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-shadow: 0 0 20px rgba(0,212,255,0.5), 0 0 40px rgba(0,212,255,0.2);
  }

  .subtitle {
    margin-top: 0.4rem;
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
  }

  .gate-selector {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .gate-btn {
    background: var(--key-off);
    border: 1px solid var(--key-border);
    color: var(--text-dim);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.55rem 1rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s ease;
  }

  .gate-btn:hover {
    border-color: var(--accent2);
    color: var(--accent);
  }

  .gate-btn.active {
    background: rgba(0,212,255,0.12);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,0.25), inset 0 0 12px rgba(0,212,255,0.08);
  }

  .main-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  .main-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  }

  .gate-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3rem;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }

  .inputs-side {
    display: flex;
    flex-direction: column;
    gap: 2rem;
    align-items: flex-end;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .key-label {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .key-indicator {
    width: 64px;
    height: 64px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    border: 2px solid var(--key-border);
    background: var(--key-off);
    color: var(--text-dim);
    transition: all 0.08s ease;
    user-select: none;
    position: relative;
  }

  .key-indicator.pressed {
    background: rgba(0,255,136,0.15);
    border-color: var(--on-color);
    color: var(--on-color);
    box-shadow: 0 0 16px rgba(0,255,136,0.35), inset 0 0 12px rgba(0,255,136,0.1);
    transform: scale(0.95) translateY(2px);
  }

  .key-indicator .bit {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    opacity: 0.7;
  }

  .gate-symbol {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gate-svg {
    filter: drop-shadow(0 0 6px rgba(0,212,255,0.3));
  }

  .output-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .bulb-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .bulb {
    width: 90px;
    height: 90px;
    position: relative;
  }

  .bulb svg {
    width: 100%;
    height: 100%;
  }

  .bulb-glow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,230,0,0.35) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }

  .bulb.on .bulb-glow { opacity: 1; }

  .output-label {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .output-bit {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-dim);
    transition: all 0.15s;
  }

  .output-bit.on {
    color: var(--on-color);
    text-shadow: 0 0 12px rgba(0,255,136,0.5);
  }

  .truth-table {
    background: var(--gate-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .table-title {
    padding: 0.6rem 1rem;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    padding: 0.5rem 1.2rem;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 0.5rem 1.2rem;
    font-size: 0.85rem;
    text-align: center;
    color: var(--text);
    transition: all 0.15s;
  }

  tr.active-row { background: rgba(0,212,255,0.08); }
  tr.active-row td { color: var(--accent); font-weight: 700; }

  .wire {
    stroke: var(--text-dim);
    stroke-width: 2;
    fill: none;
    transition: stroke 0.15s;
  }

  .wire.hot { stroke: var(--on-color); filter: drop-shadow(0 0 3px #00ff88); }

  .gate-name-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-align: center;
    margin-top: 0.3rem;
  }

  .info-bar {
    margin-top: 2rem;
    padding: 1rem 1.5rem;
    background: rgba(0,212,255,0.04);
    border: 1px solid rgba(0,212,255,0.12);
    border-radius: 8px;
    font-size: 0.72rem;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.05em;
    line-height: 1.8;
  }

  .info-bar span { color: var(--accent); }

  .hint {
    margin-top: 0.8rem;
    font-size: 0.65rem;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.05em;
  }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(255,220,0,0.6)); }
    50% { filter: drop-shadow(0 0 14px rgba(255,220,0,0.95)); }
  }

  .bulb.on .bulb-inner { animation: pulse-glow 1.2s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>LOGIC GATE SIMULATOR</h1>
    <div class="subtitle">SIMULADOR DE COMPUERTAS LÓGICAS — MODO TECLADO</div>
  </header>

  <div class="gate-selector">
    <button class="gate-btn active" data-gate="AND">AND</button>
    <button class="gate-btn" data-gate="OR">OR</button>
    <button class="gate-btn" data-gate="NAND">NAND</button>
    <button class="gate-btn" data-gate="NOR">NOR</button>
    <button class="gate-btn" data-gate="XOR">XOR</button>
    <button class="gate-btn" data-gate="XNOR">XNOR</button>
    <button class="gate-btn" data-gate="NOT">NOT</button>
    <button class="gate-btn" data-gate="BUFFER">BUFFER</button>
  </div>

  <div class="main-panel">
    <div class="gate-display">
      <div class="inputs-side" id="inputsSide">
        <div class="input-group">
          <div class="key-label">ENTRADA A</div>
          <div class="key-indicator" id="keyA">
            <span id="keyALabel">A</span>
            <span class="bit" id="bitA">0</span>
          </div>
        </div>
        <div class="input-group" id="inputB">
          <div class="key-label">ENTRADA B</div>
          <div class="key-indicator" id="keyB">
            <span id="keyBLabel">S</span>
            <span class="bit" id="bitB">0</span>
          </div>
        </div>
      </div>

      <div class="gate-symbol">
        <svg class="gate-svg" id="gateSvg" viewBox="0 0 180 120" width="180" height="120"></svg>
        <div class="gate-name-badge" id="gateNameBadge">AND</div>
      </div>

      <div class="output-side">
        <div class="bulb-wrap">
          <div class="output-label">SALIDA</div>
          <div class="bulb" id="bulb">
            <div class="bulb-glow"></div>
            <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="bulbGrad" cx="50%" cy="40%" r="50%">
                  <stop offset="0%" stop-color="#fff5a0" id="gradStop0"/>
                  <stop offset="60%" stop-color="#ffa500" id="gradStop1"/>
                  <stop offset="100%" stop-color="#cc6600" id="gradStop2"/>
                </radialGradient>
              </defs>
              <ellipse cx="45" cy="38" rx="26" ry="28" fill="#1a2a1a" id="bulbBody" class="bulb-inner" stroke="#2a4a2a" stroke-width="1.5"/>
              <rect x="34" y="63" width="22" height="5" rx="2" fill="#2a3a2a" id="bulbBase1"/>
              <rect x="36" y="68" width="18" height="4" rx="2" fill="#2a3a2a" id="bulbBase2"/>
              <rect x="38" y="72" width="14" height="3" rx="1.5" fill="#2a3a2a" id="bulbBase3"/>
              <path d="M38 55 Q35 47 38 40 Q41 33 45 30 Q49 27 52 30 Q55 33 52 42 L50 55 Z" fill="#222f22" id="bulbFilament"/>
            </svg>
          </div>
          <div class="output-bit" id="outputBit">0</div>
          <div class="output-label" id="outputState">APAGADO</div>
        </div>
      </div>
    </div>

    <div class="truth-table">
      <div class="table-title">TABLA DE VERDAD</div>
      <table id="truthTable"></table>
    </div>

    <div class="info-bar" id="infoBar">
      Presiona <span>A</span> y <span>S</span> al mismo tiempo para activar ambas entradas.
      Suelta para desactivar.
    </div>
  </div>

  <div class="hint">Selecciona una compuerta arriba · Las teclas se pueden mantener presionadas</div>
</div>

<script>
const gates = {
  AND:    { inputs: 2, fn: (a,b) => a & b,  desc: 'Presiona A y S al mismo tiempo para obtener salida 1.' },
  OR:     { inputs: 2, fn: (a,b) => a | b,  desc: 'Presiona A o S (o ambas) para obtener salida 1.' },
  NAND:   { inputs: 2, fn: (a,b) => !(a & b) ? 1 : 0, desc: 'Salida 0 solo cuando A y S están ambas activas.' },
  NOR:    { inputs: 2, fn: (a,b) => !(a | b) ? 1 : 0, desc: 'Salida 1 solo cuando ambas entradas están en 0.' },
  XOR:    { inputs: 2, fn: (a,b) => a ^ b,  desc: 'Presiona A o S, pero no ambas a la vez, para obtener 1.' },
  XNOR:   { inputs: 2, fn: (a,b) => (a ^ b) ? 0 : 1, desc: 'Salida 1 cuando las entradas son iguales.' },
  NOT:    { inputs: 1, fn: (a) => a ? 0 : 1, desc: 'Invierte la entrada. Sin presionar = 1, presionando A = 0.' },
  BUFFER: { inputs: 1, fn: (a) => a,         desc: 'Pasa la señal tal cual. Presiona A para activar.' },
};

const KEY_A = 'a', KEY_B = 's';
let pressedKeys = new Set();
let currentGate = 'AND';

function getInputs() {
  const a = pressedKeys.has(KEY_A) ? 1 : 0;
  const b = pressedKeys.has(KEY_B) ? 1 : 0;
  return { a, b };
}

function computeOutput(gate, a, b) {
  const g = gates[gate];
  return g.inputs === 1 ? g.fn(a) : g.fn(a, b);
}

function buildTruthTable(gate) {
  const g = gates[gate];
  const t = document.getElementById('truthTable');
  if (g.inputs === 2) {
    t.innerHTML = `<thead><tr><th>A</th><th>B</th><th>SALIDA</th></tr></thead><tbody>
      ${[[0,0],[0,1],[1,0],[1,1]].map(([a,b]) => {
        const out = computeOutput(gate, a, b);
        return `<tr id="tr_${a}_${b}"><td>${a}</td><td>${b}</td><td>${out}</td></tr>`;
      }).join('')}
    </tbody>`;
  } else {
    t.innerHTML = `<thead><tr><th>A</th><th>SALIDA</th></tr></thead><tbody>
      ${[[0],[1]].map(([a]) => {
        const out = computeOutput(gate, a, 0);
        return `<tr id="tr_${a}_x"><td>${a}</td><td>${out}</td></tr>`;
      }).join('')}
    </tbody>`;
  }
}

function highlightRow(gate, a, b) {
  document.querySelectorAll('#truthTable tr').forEach(r => r.classList.remove('active-row'));
  const g = gates[gate];
  const id = g.inputs === 2 ? `tr_${a}_${b}` : `tr_${a}_x`;
  const row = document.getElementById(id);
  if (row) row.classList.add('active-row');
}

function setOutput(out) {
  const bulb = document.getElementById('bulb');
  const bit = document.getElementById('outputBit');
  const state = document.getElementById('outputState');
  const body = document.getElementById('bulbBody');
  const fil = document.getElementById('bulbFilament');
  const b1 = document.getElementById('bulbBase1');
  const b2 = document.getElementById('bulbBase2');
  const b3 = document.getElementById('bulbBase3');
  const gs0 = document.getElementById('gradStop0');
  const gs1 = document.getElementById('gradStop1');
  const gs2 = document.getElementById('gradStop2');

  if (out) {
    bulb.classList.add('on');
    bit.classList.add('on');
    body.setAttribute('fill', 'url(#bulbGrad)');
    body.setAttribute('stroke', '#ffcc44');
    fil.setAttribute('fill', '#ffe0a0');
    b1.setAttribute('fill', '#4a5a4a');
    b2.setAttribute('fill', '#4a5a4a');
    b3.setAttribute('fill', '#4a5a4a');
    gs0.setAttribute('stop-color', '#fffff0');
    gs1.setAttribute('stop-color', '#ffd700');
    gs2.setAttribute('stop-color', '#ff8c00');
    bit.textContent = '1';
    state.textContent = 'ENCENDIDO';
  } else {
    bulb.classList.remove('on');
    bit.classList.remove('on');
    body.setAttribute('fill', '#1a2a1a');
    body.setAttribute('stroke', '#2a4a2a');
    fil.setAttribute('fill', '#222f22');
    b1.setAttribute('fill', '#2a3a2a');
    b2.setAttribute('fill', '#2a3a2a');
    b3.setAttribute('fill', '#2a3a2a');
    bit.textContent = '0';
    state.textContent = 'APAGADO';
  }
}

function drawGateSVG(gate, wireA, wireB, outputOn) {
  const svg = document.getElementById('gateSvg');
  const wA = wireA ? '#00ff88' : '#4a6a8a';
  const wB = wireB ? '#00ff88' : '#4a6a8a';
  const wO = outputOn ? '#00ff88' : '#4a6a8a';
  const glowA = wireA ? 'drop-shadow(0 0 3px #00ff88)' : 'none';
  const glowB = wireB ? 'drop-shadow(0 0 3px #00ff88)' : 'none';
  const glowO = outputOn ? 'drop-shadow(0 0 3px #00ff88)' : 'none';

  const twoInputs = gates[gate].inputs === 2;

  let gateShape = '';
  let wiresIn = '';
  let wireOut = '';

  if (twoInputs) {
    wiresIn = `
      <line x1="0" y1="35" x2="55" y2="35" stroke="${wA}" stroke-width="2" style="filter:${glowA}"/>
      <line x1="0" y1="85" x2="55" y2="85" stroke="${wB}" stroke-width="2" style="filter:${glowB}"/>
    `;
    wireOut = `<line x1="125" y1="60" x2="180" y2="60" stroke="${wO}" stroke-width="2" style="filter:${glowO}"/>`;
  } else {
    wiresIn = `<line x1="0" y1="60" x2="55" y2="60" stroke="${wA}" stroke-width="2" style="filter:${glowA}"/>`;
    wireOut = `<line x1="125" y1="60" x2="180" y2="60" stroke="${wO}" stroke-width="2" style="filter:${glowO}"/>`;
  }

  const bodyColor = '#0d1926';
  const bodyStroke = '#00d4ff';

  if (gate === 'AND') {
    gateShape = `<path d="M55,25 L85,25 Q125,25 125,60 Q125,95 85,95 L55,95 Z" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>`;
  } else if (gate === 'OR') {
    gateShape = `<path d="M55,25 Q70,25 85,25 Q115,25 125,60 Q115,95 85,95 Q70,95 55,95 Q65,60 55,25 Z" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>`;
  } else if (gate === 'NAND') {
    gateShape = `<path d="M55,25 L82,25 Q115,25 115,60 Q115,95 82,95 L55,95 Z" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>
    <circle cx="120" cy="60" r="6" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>`;
    wireOut = `<line x1="126" y1="60" x2="180" y2="60" stroke="${wO}" stroke-width="2" style="filter:${glowO}"/>`;
  } else if (gate === 'NOR') {
    gateShape = `<path d="M55,25 Q70,25 82,25 Q108,25 115,60 Q108,95 82,95 Q70,95 55,95 Q65,60 55,25 Z" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>
    <circle cx="120" cy="60" r="6" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>`;
    wireOut = `<line x1="126" y1="60" x2="180" y2="60" stroke="${wO}" stroke-width="2" style="filter:${glowO}"/>`;
  } else if (gate === 'XOR') {
    gateShape = `<path d="M60,25 Q75,25 85,25 Q115,25 125,60 Q115,95 85,95 Q75,95 60,95 Q70,60 60,25 Z" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>
    <path d="M52,25 Q62,60 52,95" fill="none" stroke="${bodyStroke}" stroke-width="1.5"/>`;
    wiresIn = `
      <line x1="0" y1="35" x2="52" y2="35" stroke="${wA}" stroke-width="2" style="filter:${glowA}"/>
      <line x1="0" y1="85" x2="52" y2="85" stroke="${wB}" stroke-width="2" style="filter:${glowB}"/>
    `;
  } else if (gate === 'XNOR') {
    gateShape = `<path d="M60,25 Q75,25 82,25 Q108,25 115,60 Q108,95 82,95 Q75,95 60,95 Q70,60 60,25 Z" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>
    <path d="M52,25 Q62,60 52,95" fill="none" stroke="${bodyStroke}" stroke-width="1.5"/>
    <circle cx="120" cy="60" r="6" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>`;
    wiresIn = `
      <line x1="0" y1="35" x2="52" y2="35" stroke="${wA}" stroke-width="2" style="filter:${glowA}"/>
      <line x1="0" y1="85" x2="52" y2="85" stroke="${wB}" stroke-width="2" style="filter:${glowB}"/>
    `;
    wireOut = `<line x1="126" y1="60" x2="180" y2="60" stroke="${wO}" stroke-width="2" style="filter:${glowO}"/>`;
  } else if (gate === 'NOT') {
    gateShape = `<path d="M55,30 L55,90 L112,60 Z" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>
    <circle cx="118" cy="60" r="6" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>`;
    wireOut = `<line x1="124" y1="60" x2="180" y2="60" stroke="${wO}" stroke-width="2" style="filter:${glowO}"/>`;
  } else if (gate === 'BUFFER') {
    gateShape = `<path d="M55,30 L55,90 L125,60 Z" fill="${bodyColor}" stroke="${bodyStroke}" stroke-width="1.5"/>`;
  }

  svg.innerHTML = wiresIn + gateShape + wireOut;
}

function update() {
  const { a, b } = getInputs();
  const out = computeOutput(currentGate, a, b);

  document.getElementById('keyA').classList.toggle('pressed', a === 1);
  document.getElementById('bitA').textContent = a;
  document.getElementById('keyB').classList.toggle('pressed', b === 1);
  document.getElementById('bitB').textContent = b;

  setOutput(out);
  drawGateSVG(currentGate, a === 1, b === 1, out === 1);
  highlightRow(currentGate, a, b);
}

function switchGate(gate) {
  currentGate = gate;
  document.querySelectorAll('.gate-btn').forEach(b => b.classList.toggle('active', b.dataset.gate === gate));

  const g = gates[gate];
  const inputB = document.getElementById('inputB');
  const infoBar = document.getElementById('infoBar');

  if (g.inputs === 1) {
    inputB.style.visibility = 'hidden';
    inputB.style.pointerEvents = 'none';
  } else {
    inputB.style.visibility = 'visible';
    inputB.style.pointerEvents = 'auto';
  }

  infoBar.innerHTML = g.desc.replace(/(A|S)/g, '<span>$1</span>');
  document.getElementById('gateNameBadge').textContent = gate;

  buildTruthTable(gate);
  update();
}

document.querySelectorAll('.gate-btn').forEach(btn => {
  btn.addEventListener('click', () => switchGate(btn.dataset.gate));
});

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === KEY_A || k === KEY_B) {
    e.preventDefault();
    pressedKeys.add(k);
    update();
  }
});

document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k === KEY_A || k === KEY_B) {
    pressedKeys.delete(k);
    update();
  }
});

switchGate('AND');
</script>
</body>
</html>
